{% extends "base.html" %}

{% block content %}
  <div class="form-container">
    <h1>⚠️ Confirm delete</h1>
    <p>Are you sure you want to delete <strong>{{ object }}</strong>?</p>
    <form method="post">
      {% csrf_token %}
      <input type="submit" value="Yes, delete" class="btn-delete">
      <a href="javascript:history.back()" class="btn-cancel">Cancel</a>
    </form>
  </div>
{% endblock %}
