{% extends "base.html" %}
{% block title %}Delete worker{% endblock %}
{% block content %}
<div class="container" style="max-width: 720px;">
  <div class="card shadow-sm">
    <div class="card-body p-4">
      <h1 class="h4 mb-3">🗑 Delete employee</h1>
      <p class="mb-4">
        Are you sure you want to delete
        <strong>{{ object.get_full_name|default:object.username }}</strong>?
        This action cannot be undone.
      </p>
      <form method="post">
        {% csrf_token %}
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-danger">Yes, delete</button>
          <a href="{% url 'task_manager:worker-detail' object.pk %}" class="btn btn-outline-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
