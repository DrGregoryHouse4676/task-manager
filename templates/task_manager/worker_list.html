{% extends "base.html" %}
{% block title %}Workers{% endblock %}

{% block content %}
<div class="d-flex align-items-center justify-content-between mb-3">
  <h1 class="mb-0">👷 Workers</h1>
  <a href="{% url 'task_manager:worker-create' %}" class="btn btn-primary"> ➕ Add worker </a>
</div>
<table class="table table-striped table-hover shadow-sm">
  <thead class="table-dark">
    <tr>
      <th>Username</th>
      <th>Email</th>
      <th>Position</th>
    </tr>
  </thead>
  <tbody>
    {% for worker in object_list %}
    <tr>
      <td>{{ worker.username }}</td>
      <td>{{ worker.email }}</td>
      <td>{{ worker.position }}</td>
    </tr>
    {% empty %}
    <tr><td colspan="3">No workers yet</td></tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
