{% extends "base.html" %}
{% block title %}Tasks{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h1>📑 Task list</h1>
    <a href="{% url 'task_manager:task-create' %}" class="btn btn-primary">➕ Create New Task</a>
</div>

<div class="row">
  {% for task in object_list %}
    <div class="col-md-4">
      <div class="card shadow-sm mb-4">
        <div class="card-body">
          <h5 class="card-title">{{ task.name }}</h5>
          <p class="card-text">{{ task.description|truncatechars:100 }}</p>
          <p><strong>Deadline:</strong> {{ task.deadline }}</p>
          <a href="{% url 'task_manager:task-detail' task.id %}" class="btn btn-outline-primary btn-sm">🔍 View</a>
        </div>
      </div>
    </div>
  {% empty %}
    <p>No tasks yet.</p>
  {% endfor %}
</div>
{% endblock %}
